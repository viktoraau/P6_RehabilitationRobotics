controller_manager:
  ros__parameters:
    # More forgiving rate to avoid overruns on USB/CAN.
    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    joint_group_position_controller:
      type: position_controllers/JointGroupPositionController

    joint_group_velocity_controller:
      type: velocity_controllers/JointGroupVelocityController

joint_trajectory_controller:
  ros__parameters:
    command_interfaces:
      - position
      - velocity
    state_interfaces:
      - position
      - velocity
    joints:
      - joint_1
      - joint_2
      - joint_3
    constraints:
      goal_time: 0.2
      stopped_velocity_tolerance: 0.05
      joint_1: {trajectory: 1.0 ,goal: 0.01 }
      joint_2: {trajectory: 1.0 ,goal: 0.01 }
      joint_3: {trajectory: 1.0 ,goal: 0.01 }

    interface_names:
      position: position
      velocity: velocity
    state_publish_rate: 25.0
    action_monitor_rate: 10.0

joint_group_position_controller:
  ros__parameters:
    joints:
      - joint_1
      - joint_2
      - joint_3
    interface_name: position

joint_group_velocity_controller:
  ros__parameters:
    joints:
      - joint_1
      - joint_2
      - joint_3
    interface_name: velocity
